<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 관리</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 28px; color: #ff6b9d; }
        .header p { color: #666; font-size: 14px; }
        .tab-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .tab-btn {
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            border-color: #ff6b9d;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            border-color: transparent;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 2rem;
        }
        .card h2 { font-size: 20px; margin-bottom: 1.5rem; color: #333; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-box {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            text-align: center;
        }
        .stat-label { font-size: 12px; opacity: 0.9; margin-bottom: 0.3rem; }
        .stat-number { font-size: 32px; font-weight: 700; }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Fredoka', sans-serif;
            font-size: 14px;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #ff6b9d;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Fredoka', sans-serif;
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 157, 0.3);
        }
        .btn-danger { 
            background: #ff6b6b;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
            display: inline-block;
        }
        .btn-danger:hover { background: #ff5252; }
        .student-card {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #ff6b9d;
            cursor: pointer;
            transition: all 0.2s;
        }
        .student-card:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        .student-name { font-weight: 600; margin-bottom: 0.5rem; }
        .student-detail { font-size: 13px; color: #666; }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }
        .empty-state { text-align: center; padding: 2rem; color: #999; }
        .scroll-container { max-height: 400px; overflow-y: auto; }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: white;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .back-link:hover { text-decoration: underline; }
        
        /* 모달 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); }
        .modal.show { display: flex; align-items: center; justify-content: center; }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 90%;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-content h2 { margin-bottom: 1.5rem; color: #ff6b9d; }
        .modal-info { margin-bottom: 1rem; }
        .modal-label { font-weight: 600; color: #666; font-size: 12px; }
        .modal-value { font-size: 16px; font-weight: 600; color: #333; margin: 5px 0 15px 0; }
        .modal-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-close { background: #e9ecef; color: #333; }
        
        .hint { font-size: 12px; color: #999; margin-top: 8px; }
        
        @media (max-width: 768px) {
            .grid-2, .stats-grid { grid-template-columns: 1fr; }
            .tab-buttons { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← 출석 입력 화면</a>
        
        <div class="header">
            <h1>🎨 레이첼영어학원 관리</h1>
            <p>학생 정보 및 출결 관리</p>
        </div>
        
        <div class="tab-buttons">
            <button class="tab-btn active" data-tab="dashboard">📊 대시보드</button>
            <button class="tab-btn" data-tab="students">👥 학생</button>
            <button class="tab-btn" data-tab="attendance">✓ 출결</button>
        </div>
        
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">전체 학생</div>
                    <div class="stat-number" id="totalStudents">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">오늘 등원</div>
                    <div class="stat-number" id="todayCheckin">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">미등원</div>
                    <div class="stat-number" id="absent">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">이달 평균</div>
                    <div class="stat-number" id="monthAvg">0%</div>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="card">
                    <h2>🚨 오늘 미등원</h2>
                    <div id="absentList" class="scroll-container"></div>
                </div>
                <div class="card">
                    <h2>✅ 오늘 활동</h2>
                    <div id="todayLog" class="scroll-container"></div>
                </div>
            </div>
        </div>
        
        <div id="students" class="tab-content">
            <div class="grid-2">
                <div class="card">
                    <h2>➕ 학생 등록</h2>
                    <div class="form-group">
                        <label>학생 이름 *</label>
                        <input type="text" id="studentName">
                    </div>
                    <div class="form-group">
                        <label>학년/반 *</label>
                        <input type="text" id="studentGrade">
                    </div>
                    <div class="form-group">
                        <label>태블릿 입력 번호 * (5자리)</label>
                        <input type="text" id="pinCode" maxlength="5" placeholder="예: 23311">
                        <div class="hint">💡 부모님 뒷자리 + (첫째:1 / 둘째:2 / 셋째:3)<br>예) 2331 → 23311</div>
                    </div>
                    <div class="form-group">
                        <label>부모 전화번호</label>
                        <input type="text" id="parentPhone">
                    </div>
                    <div class="form-group">
                        <label>부모 이름</label>
                        <input type="text" id="parentName">
                    </div>
                    <div class="form-group">
                        <label>부모 이메일</label>
                        <input type="email" id="parentEmail">
                    </div>
                    <button class="btn-primary" id="saveBtn">등록</button>
                </div>
                
                <div class="card">
                    <h2>👥 등록된 학생 (<span id="studentCount">0</span>)</h2>
                    <div id="studentList" class="scroll-container"></div>
                </div>
            </div>
        </div>
        
        <div id="attendance" class="tab-content">
            <div class="card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>날짜</label>
                        <input type="date" id="attendanceDate">
                    </div>
                    <div class="form-group">
                        <label>구분</label>
                        <select id="attendanceMode">
                            <option value="checkin">등원</option>
                            <option value="checkout">하원</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="grid-2">
                <div class="card">
                    <h2>학생 선택</h2>
                    <div id="attendanceStudentList" class="scroll-container"></div>
                </div>
                <div class="card">
                    <h2>기록</h2>
                    <div id="attendanceLog" class="scroll-container"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <h2 id="modalStudentName">학생이름</h2>
            <div class="modal-info">
                <div class="modal-label">학년/반</div>
                <div class="modal-value" id="modalGrade">-</div>
                <div class="modal-label">태블릿 번호</div>
                <div class="modal-value" id="modalPin">-</div>
                <div class="modal-label">부모 이름</div>
                <div class="modal-value" id="modalParentName">-</div>
                <div class="modal-label">부모 전화</div>
                <div class="modal-value" id="modalPhone">-</div>
                <div class="modal-label">부모 이메일</div>
                <div class="modal-value" id="modalEmail">-</div>
            </div>
            <div class="modal-buttons">
                <button class="btn-primary" id="deleteBtn">삭제</button>
                <button class="btn-close" id="closeModalBtn">닫기</button>
            </div>
        </div>
    </div>
    
    <script>
        let students = [];
        let attendance = {};
        let selectedStudent = null;
        
        function loadData() {
            const s = localStorage.getItem('acad-students');
            const a = localStorage.getItem('acad-attendance');
            if (s) {
                try {
                    students = JSON.parse(s);
                } catch(e) {
                    students = [];
                }
            }
            if (a) {
                try {
                    attendance = JSON.parse(a);
                } catch(e) {
                    attendance = {};
                }
            }
        }
        
        function saveData() {
            localStorage.setItem('acad-students', JSON.stringify(students));
            localStorage.setItem('acad-attendance', JSON.stringify(attendance));
        }
        
        function saveStudent() {
            const name = document.getElementById('studentName').value.trim();
            const grade = document.getElementById('studentGrade').value.trim();
            const pinCode = document.getElementById('pinCode').value.trim();
            const phone = document.getElementById('parentPhone').value.trim();
            const pName = document.getElementById('parentName').value.trim();
            const pEmail = document.getElementById('parentEmail').value.trim();
            
            if (!name || !grade || !pinCode) {
                alert('필수 항목을 입력하세요');
                return;
            }
            
            if (pinCode.length !== 5) {
                alert('5자리여야 합니다');
                return;
            }
            
            if (students.some(s => s.pinCode === pinCode)) {
                alert('이미 사용 중인 번호입니다');
                return;
            }
            
            const isDuplicatePhone = phone && students.some(s => s.phone === phone);
            if (isDuplicatePhone && !confirm('형제로 등록하시겠습니까?')) return;
            
            students.push({ 
                id: Date.now().toString(), 
                name, grade, pinCode, phone, pName, pEmail 
            });
            saveData();
            clearForm();
            updateStudentList();
            updateAttendanceList();
            alert('등록되었습니다');
        }
        
        function clearForm() {
            document.getElementById('studentName').value = '';
            document.getElementById('studentGrade').value = '';
            document.getElementById('pinCode').value = '';
            document.getElementById('parentPhone').value = '';
            document.getElementById('parentName').value = '';
            document.getElementById('parentEmail').value = '';
        }
        
        function showStudentModal(id) {
            selectedStudent = students.find(s => s.id === id);
            if (!selectedStudent) return;
            
            document.getElementById('modalStudentName').textContent = selectedStudent.name;
            document.getElementById('modalGrade').textContent = selectedStudent.grade;
            document.getElementById('modalPin').textContent = selectedStudent.pinCode;
            document.getElementById('modalParentName').textContent = selectedStudent.pName || '-';
            document.getElementById('modalPhone').textContent = selectedStudent.phone || '-';
            document.getElementById('modalEmail').textContent = selectedStudent.pEmail || '-';
            document.getElementById('studentModal').classList.add('show');
        }
        
        function closeStudentModal() {
            document.getElementById('studentModal').classList.remove('show');
            selectedStudent = null;
        }
        
        function deleteStudent() {
            if (!selectedStudent) return;
            if (!confirm('정말 삭제하시겠습니까?')) return;
            students = students.filter(s => s.id !== selectedStudent.id);
            saveData();
            closeStudentModal();
            updateStudentList();
            updateAttendanceList();
            updateDashboard();
        }
        
        function updateStudentList() {
            const html = students.length === 0 
                ? '<div class="empty-state">등록된 학생이 없습니다</div>' 
                : students.map(s => `
                    <div class="student-card" onclick="showStudentModal('${s.id}')">
                        <div class="student-name">${s.name}</div>
                        <div class="student-detail">${s.grade} • 번호: ${s.pinCode}</div>
                    </div>
                `).join('');
            document.getElementById('studentList').innerHTML = html;
            document.getElementById('studentCount').textContent = students.length;
        }
        
        function recordAttendance(sid) {
            const date = document.getElementById('attendanceDate').value;
            const mode = document.getElementById('attendanceMode').value;
            const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
            const student = students.find(s => s.id === sid);
            if (!student) return;
            if (!attendance[date]) attendance[date] = [];
            attendance[date].push({ 
                id: Date.now().toString(), 
                studentId: sid, 
                name: student.name, 
                type: mode, 
                time 
            });
            saveData();
            updateDashboard();
            updateAttendanceList();
        }
        
        function updateAttendanceList() {
            const date = document.getElementById('attendanceDate').value;
            const mode = document.getElementById('attendanceMode').value;
            const records = (attendance[date] || []).filter(r => r.type === mode);
            
            const studentHtml = students.length === 0 
                ? '<div class="empty-state">등록된 학생이 없습니다</div>' 
                : students.map(s => {
                    const recorded = records.some(r => r.studentId === s.id);
                    return `<button class="student-card" style="background: ${recorded ? '#d1fae5' : '#f8f9fa'}; text-align: left; border: none; cursor: pointer;" onclick="recordAttendance('${s.id}')"><div class="student-name">${s.name}${recorded ? ' ✓' : ''}</div></button>`;
                }).join('');
            
            const logHtml = records.length === 0 
                ? '<div class="empty-state">기록이 없습니다</div>' 
                : records.map(r => `<div class="student-card"><div class="student-name">${r.name}</div><div class="student-detail">${r.time}</div></div>`).join('');
            
            document.getElementById('attendanceStudentList').innerHTML = studentHtml;
            document.getElementById('attendanceLog').innerHTML = logHtml;
        }
        
        function updateDashboard() {
            const today = new Date().toISOString().split('T')[0];
            const todayRecords = attendance[today] || [];
            const checkins = todayRecords.filter(r => r.type === 'checkin');
            const checkinIds = new Set(checkins.map(r => r.studentId));
            const absentList = students.filter(s => !checkinIds.has(s.id));
            
            document.getElementById('totalStudents').textContent = students.length;
            document.getElementById('todayCheckin').textContent = checkins.length;
            document.getElementById('absent').textContent = absentList.length;
            
            const absentHtml = absentList.length === 0 
                ? '<div class="empty-state">모두 등원했습니다 🎉</div>' 
                : absentList.map(s => `<div class="student-card"><div class="student-name">${s.name}</div></div>`).join('');
            
            const logHtml = todayRecords.length === 0 
                ? '<div class="empty-state">아직 기록이 없습니다</div>' 
                : todayRecords.map(r => `<div class="student-card"><div class="student-name">${r.name}</div><div class="student-detail">${r.time} (${r.type === 'checkin' ? '등원' : '하원'})</div></div>`).join('');
            
            document.getElementById('absentList').innerHTML = absentHtml;
            document.getElementById('todayLog').innerHTML = logHtml;
        }
        
        // 이벤트 리스너
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
            document.getElementById('attendanceDate').valueAsDate = new Date();
            updateDashboard();
            updateStudentList();
            updateAttendanceList();
            
            // 탭 버튼
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.getAttribute('data-tab');
                    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
                    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                    document.getElementById(tabName).classList.add('active');
                    this.classList.add('active');
                });
            });
            
            // 저장 버튼
            document.getElementById('saveBtn').addEventListener('click', saveStudent);
            
            // 모달 닫기
            document.getElementById('closeModalBtn').addEventListener('click', closeStudentModal);
            document.getElementById('deleteBtn').addEventListener('click', deleteStudent);
        });
    </script>
</body>
</html>
