<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 출석</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; }
        h1 { color: #ff6b9d; font-size: 36px; margin-bottom: 20px; }
        .display { background: #f0f0f0; padding: 20px; font-size: 40px; margin: 20px 0; border-radius: 10px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        button { padding: 15px; font-size: 18px; border: 2px solid #ddd; background: white; border-radius: 5px; cursor: pointer; }
        button:hover { background: #f0f0f0; }
        button:active { transform: scale(0.95); }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .btn-submit { padding: 15px; background: #ff6b9d; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-submit:hover { background: #ff5a8b; }
        .admin { margin-top: 20px; }
        .admin button { width: 100%; padding: 10px; background: #999; color: white; font-weight: bold; }
        .admin button:hover { background: #777; }
        .modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-box { background: white; padding: 50px; border-radius: 20px; text-align: center; min-width: 400px; }
        .modal-icon { font-size: 80px; margin-bottom: 20px; }
        .modal-name { font-size: 48px; font-weight: bold; color: #ff6b9d; margin-bottom: 20px; }
        .modal-text { font-size: 36px; color: #333; margin-bottom: 20px; line-height: 1.4; }
        .modal-time { font-size: 24px; color: #999; }

        .record-modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .record-modal.show { display: flex; }
        .record-box { background: white; padding: 25px; border-radius: 16px; text-align: left; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; }
        .record-box h2 { color: #ff6b9d; font-size: 22px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
        .record-close { border: none; background: #eee; border-radius: 50%; width: 32px; height: 32px; font-size: 16px; cursor: pointer; }
        .record-controls { display: flex; gap: 8px; margin-bottom: 14px; }
        .record-controls input, .record-controls select { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .record-table { width: 100%; border-collapse: collapse; font-size: 14px; }
        .record-table th { text-align: left; padding: 8px 6px; border-bottom: 2px solid #eee; color: #888; font-size: 12px; }
        .record-table td { padding: 8px 6px; border-bottom: 1px solid #f0f0f0; }
        .record-empty { text-align: center; color: #999; padding: 20px; font-size: 14px; }
        .record-tag { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .record-tag.checkin { background: #e6f7ee; color: #2fae66; }
        .record-tag.checkout { background: #fdeceb; color: #e2574c; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 레이첼영어학원</h1>
        <p>출석 입력</p>
        
        <div class="display" id="display">•••••</div>
        
        <div class="keypad">
            <button onclick="addNum('1')">1</button>
            <button onclick="addNum('2')">2</button>
            <button onclick="addNum('3')">3</button>
            <button onclick="addNum('4')">4</button>
            <button onclick="addNum('5')">5</button>
            <button onclick="addNum('6')">6</button>
            <button onclick="addNum('7')">7</button>
            <button onclick="addNum('8')">8</button>
            <button onclick="addNum('9')">9</button>
            <button onclick="addNum('0')">0</button>
            <button onclick="clearNum()">지우기</button>
        </div>
        
        <div class="actions">
            <button class="btn-submit" onclick="checkIn()">등원</button>
            <button class="btn-submit" onclick="checkOut()" style="background: #6c757d;">하원</button>
        </div>
        
        <div class="admin">
            <button onclick="goAdmin()">🔐 관리자</button>
            <button onclick="openRecordModal()" style="margin-top:8px;background:#ff6b9d;">📋 출결 기록</button>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-icon">✅</div>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-time" id="modalTime"></div>
        </div>
    </div>

    <div class="record-modal" id="recordModal">
        <div class="record-box">
            <h2>
                <span>📋 출결 기록</span>
                <button class="record-close" onclick="closeRecordModal()">✕</button>
            </h2>
            <div class="record-controls">
                <input type="date" id="recDate">
                <select id="recMode">
                    <option value="checkin">등원</option>
                    <option value="checkout">하원</option>
                </select>
            </div>
            <table class="record-table">
                <thead><tr><th>이름</th><th>구분</th><th>시간</th></tr></thead>
                <tbody id="recTable"></tbody>
            </table>
            <div id="recEmpty" class="record-empty" style="display:none;">기록이 없습니다</div>
        </div>
    </div>
    
    <script>
        const DB_URL = 'https://academy-8829d-default-rtdb.asia-southeast1.firebasedatabase.app';
        let num = '';
        let students = [];
        
        function goAdmin() {
            const pass = prompt('관리자 비번을 입력하세요:');
            if (pass === '1234') {
                window.location.href = '/admin/';
            } else if (pass !== null) {
                alert('비번이 틀렸습니다');
            }
        }
        
        function loadStudents() {
            fetch(DB_URL + '/students.json')
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        students = Object.entries(data).map(([key, val]) => ({id: key, ...val}));
                    }
                })
                .catch(err => console.log('로드 실패:', err));
        }
        
        function addNum(n) {
            if (num.length < 5) {
                num += n;
                updateDisplay();
            }
        }
        
        function clearNum() {
            num = num.slice(0, -1);
            updateDisplay();
        }
        
        function updateDisplay() {
            const masked = num.padEnd(5, '•');
            document.getElementById('display').textContent = masked.split('').join(' ');
        }
        
        function showModal(name, text, time) {
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalTime').textContent = time;
            document.getElementById('modal').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('modal').classList.remove('show');
                num = '';
                updateDisplay();
            }, 3000);
        }
        
        function checkIn() {
            if (num.length !== 5) {
                alert('5자리 번호를 입력하세요');
                return;
            }
            
            loadStudents();
            setTimeout(() => {
                const student = students.find(s => s.pin === num);
                
                if (!student) {
                    alert('등록되지 않은 번호입니다');
                    num = '';
                    updateDisplay();
                    return;
                }
                
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});
                
                fetch(DB_URL + '/attendance/' + today + '.json', {
                    method: 'POST',
                    body: JSON.stringify({name: student.name, type: 'checkin', time})
                })
                .then(() => {
                    showModal(student.name, '님이 등원하였습니다', time);
                })
                .catch(err => {
                    alert('저장 실패: ' + err);
                    num = '';
                    updateDisplay();
                });
            }, 300);
        }
        
        function checkOut() {
            if (num.length !== 5) {
                alert('5자리 번호를 입력하세요');
                return;
            }
            
            loadStudents();
            setTimeout(() => {
                const student = students.find(s => s.pin === num);
                
                if (!student) {
                    alert('등록되지 않은 번호입니다');
                    num = '';
                    updateDisplay();
                    return;
                }
                
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});
                
                fetch(DB_URL + '/attendance/' + today + '.json', {
                    method: 'POST',
                    body: JSON.stringify({name: student.name, type: 'checkout', time})
                })
                .then(() => {
                    showModal(student.name, '님이 하원하였습니다', time);
                })
                .catch(err => {
                    alert('저장 실패: ' + err);
                    num = '';
                    updateDisplay();
                });
            }, 300);
        }
        
        window.addEventListener('load', () => {
            loadStudents();
            updateDisplay();
            document.getElementById('recDate').valueAsDate = new Date();
            document.getElementById('recDate').addEventListener('change', loadRecords);
            document.getElementById('recMode').addEventListener('change', loadRecords);
        });

        function openRecordModal() {
            document.getElementById('recordModal').classList.add('show');
            loadRecords();
        }

        function closeRecordModal() {
            document.getElementById('recordModal').classList.remove('show');
        }

        function loadRecords() {
            const date = document.getElementById('recDate').value;
            const mode = document.getElementById('recMode').value;

            fetch(DB_URL + '/attendance/' + date + '.json')
                .then(res => res.json())
                .then(data => {
                    const records = data || {};
                    let rows = '';
                    for (let key in records) {
                        const r = records[key];
                        if (r.type === mode) {
                            rows += `<tr>
                                <td><strong>${r.name}</strong></td>
                                <td><span class="record-tag ${r.type}">${r.type === 'checkin' ? '등원' : '하원'}</span></td>
                                <td>${r.time}</td>
                            </tr>`;
                        }
                    }
                    document.getElementById('recTable').innerHTML = rows;
                    document.getElementById('recEmpty').style.display = rows ? 'none' : 'block';
                })
                .catch(() => {
                    document.getElementById('recTable').innerHTML = '';
                    document.getElementById('recEmpty').style.display = 'block';
                });
        }
    </script>
</body>
</html>
