<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎓 학원 관리 시스템</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }
        .header { background: white; padding: 2rem; border-radius: 16px; margin-bottom: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header h1 { font-size: 28px; margin-bottom: 0.5rem; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .header p { color: #666; font-size: 14px; }
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card h2 { font-size: 20px; margin-bottom: 1.5rem; color: #333; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 2rem; }
        .stat-box { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 1.5rem; border-radius: 12px; text-align: center; }
        .stat-label { font-size: 12px; opacity: 0.9; margin-bottom: 0.5rem; }
        .stat-number { font-size: 32px; font-weight: 700; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 14px; color: #333; }
        input, textarea, select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: inherit; font-size: 14px; transition: all 0.3s; }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        textarea { min-height: 80px; resize: vertical; }
        button { padding: 12px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.3s; width: 100%; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3); }
        .btn-danger { background: #ff6b6b; color: white; }
        .btn-danger:hover { background: #ff5252; }
        .btn-success { background: #51cf66; color: white; }
        .btn-success:hover { background: #40c057; }
        .btn-small { padding: 6px 12px; font-size: 12px; width: auto; display: inline-block; }
        .tab-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin-bottom: 2rem; }
        .tab-btn { padding: 12px; background: white; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .tab-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .student-card { background: #f8f9fa; padding: 1.5rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid #667eea; }
        .student-name { font-weight: 600; margin-bottom: 0.5rem; }
        .student-detail { font-size: 13px; color: #666; margin: 4px 0; }
        .empty-state { text-align: center; padding: 2rem; color: #999; }
        .scroll-container { max-height: 400px; overflow-y: auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        @media (max-width: 768px) { .main-content, .grid-2 { grid-template-columns: 1fr; } .tab-buttons { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>📚 학원 관리 시스템</h1><p>완전 무료 웹기반 학생 출결 관리</p></div>
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 대시보드</button>
            <button class="tab-btn" onclick="switchTab('students')">👥 학생</button>
            <button class="tab-btn" onclick="switchTab('attendance')">✓ 출결</button>
            <button class="tab-btn" onclick="switchTab('notify')">📱 알림</button>
        </div>
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-label">전체 학생</div><div class="stat-number" id="totalStudents">0</div></div>
                <div class="stat-box"><div class="stat-label">오늘 입실</div><div class="stat-number" id="todayCheckin">0</div></div>
                <div class="stat-box"><div class="stat-label">미입실</div><div class="stat-number" id="absent">0</div></div>
                <div class="stat-box"><div class="stat-label">이달 평균</div><div class="stat-number" id="monthAvg">0%</div></div>
            </div>
            <div class="grid-2">
                <div class="card"><h2>🚨 오늘 미입실자</h2><div id="absentList" class="scroll-container"></div></div>
                <div class="card"><h2>✅ 오늘 활동</h2><div id="todayLog" class="scroll-container"></div></div>
            </div>
        </div>
        <div id="students" class="tab-content">
            <div class="main-content">
                <div class="card">
                    <h2>➕ 학생 등록</h2>
                    <div class="form-group"><label>학생 이름 *</label><input type="text" id="studentName" placeholder="예: 김은석"></div>
                    <div class="form-group"><label>학년/반 *</label><input type="text" id="studentGrade" placeholder="예: 초3-1"></div>
                    <div class="form-group"><label>부모 전화번호 *</label><input type="text" id="parentPhone" placeholder="010-1234-5678"></div>
                    <div class="form-group"><label>부모 이름</label><input type="text" id="parentName" placeholder="부모 이름"></div>
                    <div class="form-group"><label>부모 이메일</label><input type="email" id="parentEmail" placeholder="parent@email.com"></div>
                    <button class="btn-primary" onclick="saveStudent()">등록하기</button>
                </div>
                <div class="card"><h2>👥 등록된 학생 (<span id="studentCount">0</span>)</h2><div id="studentList" class="scroll-container"></div></div>
            </div>
        </div>
        <div id="attendance" class="tab-content">
            <div class="card">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div class="form-group"><label>날짜</label><input type="date" id="attendanceDate"></div>
                    <div class="form-group"><label>구분</label><select id="attendanceMode"><option value="checkin">입실</option><option value="checkout">하원</option></select></div>
                </div>
            </div>
            <div class="grid-2">
                <div class="card"><h2>학생 선택</h2><div id="attendanceStudentList" class="scroll-container"></div></div>
                <div class="card"><h2>기록 현황</h2><div id="attendanceLog" class="scroll-container"></div></div>
            </div>
        </div>
        <div id="notify" class="tab-content">
            <div class="card">
                <h2>📢 알림 메시지 설정</h2>
                <div class="form-group"><label>입실 알림 메시지</label><textarea id="notifyMessage">아이가 학원에 도착했습니다.</textarea></div>
                <button class="btn-primary" onclick="saveNotification()">저장</button>
            </div>
            <div class="card" style="margin-top: 2rem;"><h2>📋 학부모 연락처</h2><div id="parentList" class="scroll-container"></div></div>
        </div>
    </div>
    <script>
        let students = []; let attendance = {}; let notifyMsg = '아이가 학원에 도착했습니다.';
        function init() { loadData(); document.getElementById('attendanceDate').valueAsDate = new Date(); updateDashboard(); updateStudentList(); updateAttendanceList(); updateParentList(); }
        function loadData() { const s = localStorage.getItem('acad-students'); const a = localStorage.getItem('acad-attendance'); const n = localStorage.getItem('acad-notify'); if (s) students = JSON.parse(s); if (a) attendance = JSON.parse(a); if (n) notifyMsg = n; }
        function saveData() { localStorage.setItem('acad-students', JSON.stringify(students)); localStorage.setItem('acad-attendance', JSON.stringify(attendance)); }
        function switchTab(tab) { document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active')); document.getElementById(tab).classList.add('active'); event.target.classList.add('active'); }
        function saveStudent() { const name = document.getElementById('studentName').value.trim(); const grade = document.getElementById('studentGrade').value.trim(); const phone = document.getElementById('parentPhone').value.trim(); if (!name || !grade || !phone) { alert('필수 항목을 입력하세요'); return; } students.push({ id: Date.now().toString(), name, grade, phone, pName: document.getElementById('parentName').value, pEmail: document.getElementById('parentEmail').value }); saveData(); clearForm(); updateStudentList(); updateAttendanceList(); updateParentList(); }
        function clearForm() { document.getElementById('studentName').value = ''; document.getElementById('studentGrade').value = ''; document.getElementById('parentPhone').value = ''; document.getElementById('parentName').value = ''; document.getElementById('parentEmail').value = ''; }
        function deleteStudent(id) { if (!confirm('정말 삭제하시겠습니까?')) return; students = students.filter(s => s.id !== id); saveData(); updateStudentList(); updateAttendanceList(); updateParentList(); }
        function updateStudentList() { const html = students.length === 0 ? '<div class="empty-state">등록된 학생이 없습니다</div>' : students.map(s => `<div class="student-card"><div class="student-name">${s.name}</div><div class="student-detail">${s.grade} • ${s.phone}</div><button class="btn-danger btn-small" onclick="deleteStudent('${s.id}')">삭제</button></div>`).join(''); document.getElementById('studentList').innerHTML = html; document.getElementById('studentCount').textContent = students.length; }
        function recordAttendance(sid) { const date = document.getElementById('attendanceDate').value; const mode = document.getElementById('attendanceMode').value; const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' }); const student = students.find(s => s.id === sid); if (!student) return; if (!attendance[date]) attendance[date] = []; attendance[date].push({ id: Date.now().toString(), studentId: sid, name: student.name, type: mode, time }); saveData(); updateDashboard(); updateAttendanceList(); }
        function updateAttendanceList() { const date = document.getElementById('attendanceDate').value; const mode = document.getElementById('attendanceMode').value; const records = (attendance[date] || []).filter(r => r.type === mode); const studentHtml = students.length === 0 ? '<div class="empty-state">등록된 학생이 없습니다</div>' : students.map(s => { const recorded = records.some(r => r.studentId === s.id); return `<button class="student-card" style="background: ${recorded ? '#d1fae5' : '#f8f9fa'}; text-align: left; border: none; cursor: pointer;" onclick="recordAttendance('${s.id}')"><div class="student-name">${s.name}${recorded ? ' ✓' : ''}</div><div class="student-detail">${s.grade}</div></button>`; }).join(''); const logHtml = records.length === 0 ? '<div class="empty-state">기록이 없습니다</div>' : records.map(r => `<div class="student-card"><div class="student-name">${r.name}</div><div class="student-detail">${r.time}</div></div>`).join(''); document.getElementById('attendanceStudentList').innerHTML = studentHtml; document.getElementById('attendanceLog').innerHTML = logHtml; }
        function updateDashboard() { const today = new Date().toISOString().split('T')[0]; const todayRecords = attendance[today] || []; const checkins = todayRecords.filter(r => r.type === 'checkin'); const checkinIds = new Set(checkins.map(r => r.studentId)); const absentList = students.filter(s => !checkinIds.has(s.id)); document.getElementById('totalStudents').textContent = students.length; document.getElementById('todayCheckin').textContent = checkins.length; document.getElementById('absent').textContent = absentList.length; }
        function saveNotification() { notifyMsg = document.getElementById('notifyMessage').value; localStorage.setItem('acad-notify', notifyMsg); alert('알림이 저장되었습니다'); }
        function updateParentList() { const html = students.length === 0 ? '<div class="empty-state">등록된 학생이 없습니다</div>' : students.map(s => `<div class="student-card"><div class="student-name">${s.name}</div><div class="student-detail">전화: ${s.phone}</div></div>`).join(''); document.getElementById('parentList').innerHTML = html; }
        window.addEventListener('load', init);
    </script>
</body>
</html>
