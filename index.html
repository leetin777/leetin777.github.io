<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 출석</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; }
        h1 { color: #ff6b9d; font-size: 36px; margin-bottom: 20px; }
        .display { background: #f0f0f0; padding: 20px; font-size: 40px; margin: 20px 0; border-radius: 10px; }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        button { padding: 15px; font-size: 18px; border: 2px solid #ddd; background: white; border-radius: 5px; cursor: pointer; }
        button:hover { background: #f0f0f0; }
        button:active { transform: scale(0.95); }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .btn-submit { padding: 15px; background: #ff6b9d; color: white; border: none; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .btn-submit:hover { background: #ff5a8b; }
        .admin { margin-top: 20px; }
        .admin a { color: #999; text-decoration: none; font-size: 12px; }
        .modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-box { background: white; padding: 50px; border-radius: 20px; text-align: center; min-width: 400px; }
        .modal-icon { font-size: 80px; margin-bottom: 20px; }
        .modal-name { font-size: 48px; font-weight: bold; color: #ff6b9d; margin-bottom: 20px; }
        .modal-text { font-size: 36px; color: #333; margin-bottom: 20px; line-height: 1.4; }
        .modal-time { font-size: 24px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 레이첼영어학원</h1>
        <p>출석 입력</p>
        
        <div class="display" id="display">•••••</div>
        
        <div class="keypad">
            <button onclick="addNum('1')">1</button>
            <button onclick="addNum('2')">2</button>
            <button onclick="addNum('3')">3</button>
            <button onclick="addNum('4')">4</button>
            <button onclick="addNum('5')">5</button>
            <button onclick="addNum('6')">6</button>
            <button onclick="addNum('7')">7</button>
            <button onclick="addNum('8')">8</button>
            <button onclick="addNum('9')">9</button>
            <button onclick="addNum('0')">0</button>
            <button onclick="clearNum()">지우기</button>
        </div>
        
        <div class="actions">
            <button class="btn-submit" onclick="checkIn()">등원</button>
            <button class="btn-submit" onclick="checkOut()" style="background: #6c757d;">하원</button>
        </div>
        
        <div class="admin">
            <a href="/admin/">🔐 관리자</a>
        </div>
    </div>
    
    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-icon">✅</div>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-time" id="modalTime"></div>
        </div>
    </div>
    
    <script>
        let num = '';
        
        function addNum(n) {
            if (num.length < 5) {
                num += n;
                updateDisplay();
            }
        }
        
        function clearNum() {
            num = num.slice(0, -1);
            updateDisplay();
        }
        
        function updateDisplay() {
            const masked = num.padEnd(5, '•');
            document.getElementById('display').textContent = masked.split('').join(' ');
        }
        
        function showModal(name, text, time) {
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalTime').textContent = time;
            document.getElementById('modal').classList.add('show');
            
            setTimeout(() => {
                document.getElementById('modal').classList.remove('show');
                num = '';
                updateDisplay();
            }, 3000);
        }
        
        function checkIn() {
            if (num.length !== 5) {
                alert('5자리 번호를 입력하세요');
                return;
            }
            
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const student = students.find(s => s.pin === num);
            
            if (!student) {
                alert('등록되지 않은 번호입니다');
                num = '';
                updateDisplay();
                return;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});
            const att = JSON.parse(localStorage.getItem('attendance') || '{}');
            
            if (!att[today]) att[today] = [];
            att[today].push({ name: student.name, type: 'checkin', time });
            
            localStorage.setItem('attendance', JSON.stringify(att));
            showModal(student.name, '님이 등원하였습니다', time);
        }
        
        function checkOut() {
            if (num.length !== 5) {
                alert('5자리 번호를 입력하세요');
                return;
            }
            
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            const student = students.find(s => s.pin === num);
            
            if (!student) {
                alert('등록되지 않은 번호입니다');
                num = '';
                updateDisplay();
                return;
            }
            
            const today = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});
            const att = JSON.parse(localStorage.getItem('attendance') || '{}');
            
            if (!att[today]) att[today] = [];
            att[today].push({ name: student.name, type: 'checkout', time });
            
            localStorage.setItem('attendance', JSON.stringify(att));
            showModal(student.name, '님이 하원하였습니다', time);
        }
        
        updateDisplay();
    </script>
</body>
</html>
