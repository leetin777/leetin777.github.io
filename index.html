<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>레이첼영어학원 출결</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --plum:#7a2e4d;
  --coral:#ff6b9d;
  --ok:#2fae66;
  --warn:#e2574c;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:linear-gradient(135deg,#fff5fb 0%,#f0e6ff 100%);
  display:flex;align-items:center;justify-content:center;
  padding:0;overflow:hidden;
}

.page-wrap{
  display:flex;gap:0.8vw;align-items:stretch;justify-content:center;
  width:100%;height:100%;padding:1.2vh 1vw;
}

/* ===== 좌측 : 출결 입력 ===== */
.container{
  background:linear-gradient(135deg,#fff9fc 0%,#ffe6f0 100%);
  border-radius:28px;
  padding:1.6vh 1.4vw;
  width:min(430px,36vw);
  box-shadow:0 8px 32px rgba(255,107,157,.15);
  display:flex;flex-direction:column;justify-content:flex-start;
}

h1{
  color:var(--coral);
  font-size:clamp(24px,2.8vw,38px);
  font-weight:900;letter-spacing:1px;text-align:center;
  margin-bottom:0.6vh;
}

/* 번호 입력 표시 — 높이 절반, 위로 붙임 */
.display{
  background:linear-gradient(135deg,#fff5f8 0%,#ffe6f0 100%);
  border:3px solid #ffb8cf;
  border-radius:14px;
  padding:0.35vh 1vw;
  margin:0 0 1vh;
  min-height:clamp(38px,5vh,54px);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(20px,2.3vw,30px);
  font-weight:900;letter-spacing:6px;color:var(--coral);
  box-shadow:0 4px 14px rgba(255,107,157,.18);
}
.display .ph{color:#ffc2d6;letter-spacing:2px;font-size:0.62em;font-weight:700;}

/* 키패드 : 모든 키가 동일한 크기의 정사각형 (3열 정렬) */
.keypad{
  display:flex;flex-direction:column;gap:0.9vh;align-items:center;
}
.key-row{
  display:flex;justify-content:center;gap:0.7vw;width:100%;
}
.keypad button{
  width:min(calc((100% - 1.4vw) / 3), 12.5vh);
  flex:0 0 auto;
  aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;
  border:none;border-radius:16px;
  font-family:inherit;font-weight:900;
  font-size:clamp(28px,6.5vh,56px);
  color:var(--plum);
  background:linear-gradient(135deg,#ffffff 0%,#fff5f8 100%);
  box-shadow:0 4px 12px rgba(255,107,157,.15);
  cursor:pointer;transition:transform .15s,box-shadow .15s;
}
.keypad button:hover{transform:translateY(-3px);box-shadow:0 8px 18px rgba(255,107,157,.28);}
.keypad button:active{transform:scale(.95);}

.keypad .key-del{
  font-size:clamp(18px,4vh,34px);white-space:nowrap;
}
.keypad .key-in{
  background:linear-gradient(135deg,#3d8bfd,#6fb1ff);
  color:#fff;font-size:clamp(24px,5.6vh,48px);
  box-shadow:0 6px 18px rgba(61,139,253,.38);
}
.keypad .key-out{
  background:linear-gradient(135deg,#ff8c1a,#ffb056);
  color:#fff;font-size:clamp(24px,5.6vh,48px);
  box-shadow:0 6px 18px rgba(255,140,26,.38);
}

.admin{
  margin-top:1vh;padding:1.1vh 0;
  border:none;border-radius:14px;
  background:linear-gradient(135deg,#9b8dbe,#b5a5d0);
  color:#fff;font-family:inherit;font-weight:700;
  font-size:clamp(13px,1.3vw,17px);cursor:pointer;
  transition:transform .15s;
}
.admin:hover{transform:translateY(-2px);}

/* ===== 우측 : 출결 기록 ===== */
.record-panel{
  background:linear-gradient(135deg,#fff0f8 0%,#ffe6f0 100%);
  border-radius:28px;
  padding:2.2vh 1.6vw;
  width:min(380px,30vw);
  box-shadow:0 8px 32px rgba(255,107,157,.15);
  display:flex;flex-direction:column;overflow:hidden;
}
.record-panel h2{
  color:#7a4a8a;font-size:clamp(19px,1.9vw,26px);
  font-weight:900;margin-bottom:0.3vh;
}
.record-sub{
  color:#6d4b7a;font-size:clamp(12px,1.2vw,15px);
  font-weight:700;margin-bottom:1.2vh;
}
.record-list{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;gap:0.6vh;
  padding-right:4px;
}
.record-list::-webkit-scrollbar{width:6px;}
.record-list::-webkit-scrollbar-thumb{background:#ffb8cf;border-radius:10px;}
.record-row{
  display:flex;align-items:center;gap:0.6vw;
  background:linear-gradient(135deg,#ffffff 0%,#fff5f8 100%);
  padding:0.9vh 0.8vw;border-radius:16px;
  box-shadow:0 3px 12px rgba(255,107,157,.1);
}
.record-tag{
  padding:0.4vh 1vw;border-radius:20px;
  font-size:clamp(11px,1.1vw,14px);font-weight:900;flex-shrink:0;
}
.tag-in{background:linear-gradient(135deg,#d4f5e8,#a8e6d5);color:#1e8f57;}
.tag-out{background:linear-gradient(135deg,#f5d4d4,#f0a8a8);color:#c1403a;}
.record-name{flex:1;font-weight:900;color:var(--coral);font-size:clamp(13px,1.3vw,17px);}
.record-time{color:#ff8fa3;font-weight:700;font-size:clamp(11px,1.1vw,14px);}
.record-empty{
  color:#ff8fa3;text-align:center;padding:5vh 10px;
  font-size:clamp(13px,1.4vw,18px);font-weight:700;
}

/* ===== 알림 모달 ===== */
.modal{
  position:fixed;inset:0;background:rgba(0,0,0,.4);
  display:none;align-items:center;justify-content:center;z-index:99;
}
.modal.show{display:flex;}
.modal-box{
  background:#fff;border-radius:24px;padding:4vh 3vw;
  min-width:400px;text-align:center;
  font-size:clamp(18px,2vw,26px);font-weight:900;color:var(--plum);
  box-shadow:0 12px 40px rgba(0,0,0,.2);
}

/* ===== 반응형 ===== */
@media (max-width:850px){
  body{align-items:flex-start;overflow:auto;}
  .page-wrap{flex-direction:column;height:auto;}
  .container,.record-panel{width:100%;max-width:600px;margin:0 auto;}
  .record-panel{max-height:50vh;}
  .modal-box{min-width:280px;}
}
</style>
</head>
<body>

<div class="page-wrap">
  <!-- 좌측: 출결 입력 -->
  <div class="container">
    <h1>📚 레이첼영어학원</h1>

    <div class="display" id="display"><span class="ph">출결번호 5자리</span></div>

    <div class="keypad">
      <div class="key-row">
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
      </div>
      <div class="key-row">
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
      </div>
      <div class="key-row">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
      </div>
      <div class="key-row">
        <button class="key-in" onclick="submit('checkin')">등원</button>
        <button onclick="press('0')">0</button>
        <button class="key-out" onclick="submit('checkout')">하원</button>
      </div>
      <div class="key-row">
        <button class="key-del" onclick="del()">지우기</button>
      </div>
    </div>

    <button class="admin" onclick="goAdmin()">🔐 관리자</button>
  </div>

  <!-- 우측: 출결 기록 -->
  <div class="record-panel">
    <h2>📋 오늘의 출결</h2>
    <div class="record-sub" id="recordDate"></div>
    <div class="record-list" id="recordList">
      <div class="record-empty">불러오는 중…</div>
    </div>
  </div>
</div>

<div class="modal" id="modal"><div class="modal-box" id="modalText"></div></div>

<script>
const DB = 'https://academy-8829d-default-rtdb.asia-southeast1.firebasedatabase.app';
let pin = '';
let students = null;

/* ---------- 입력 ---------- */
function render(){
  const el = document.getElementById('display');
  el.innerHTML = pin ? '●'.repeat(pin.length) : '<span class="ph">출결번호 5자리</span>';
}
function press(n){ if(pin.length < 5){ pin += n; render(); } }
function del(){ pin = pin.slice(0,-1); render(); }
function clearPin(){ pin = ''; render(); }

/* ---------- 날짜 / 시간 ---------- */
function todayKey(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function nowTime(){
  return new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
}
function timeToMin(t){
  const m = String(t||'').match(/(오전|오후)?\s*(\d{1,2}):(\d{2})/);
  if(!m) return -1;
  let h = Number(m[2]) % 12;
  if(m[1] === '오후') h += 12;
  return h*60 + Number(m[3]);
}

/* ---------- 모달 ---------- */
function showModal(text, ms){
  const m = document.getElementById('modal');
  document.getElementById('modalText').textContent = text;
  m.classList.add('show');
  setTimeout(()=>m.classList.remove('show'), ms || 500);
}

/* ---------- 학생 조회 ---------- */
async function loadStudents(force){
  if(students && !force) return students;
  const res = await fetch(DB + '/students.json');
  students = (await res.json()) || {};
  return students;
}
function findByPin(list, code){
  for(const id in list){
    const s = list[id] || {};
    if(String(s.pin || '').trim() === code) return {id:id, ...s};
  }
  return null;
}

/* ---------- 출결 등록 ---------- */
async function submit(type){
  if(pin.length !== 5){ showModal('❗ 번호 5자리를 입력해 주세요', 1000); return; }
  const code = pin;
  try{
    let list = await loadStudents();
    let stu = findByPin(list, code);
    if(!stu){ list = await loadStudents(true); stu = findByPin(list, code); }
    if(!stu){ showModal('❌ 등록되지 않은 번호입니다', 1000); clearPin(); return; }

    await fetch(DB + '/attendance/' + todayKey() + '.json', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        name: stu.name,
        sid: stu.id,
        type: type,
        time: nowTime(),
        ts: Date.now()
      })
    });

    showModal(type === 'checkin'
      ? '✅ ' + stu.name + '님이 등원하였습니다'
      : '🚪 ' + stu.name + '님이 하원하였습니다', 500);
    clearPin();
    loadRecords();
  }catch(e){
    showModal('⚠️ 연결에 실패했습니다. 다시 시도해 주세요', 1200);
    clearPin();
  }
}

/* ---------- 기록 목록 ---------- */
async function loadRecords(){
  const box = document.getElementById('recordList');
  try{
    const res = await fetch(DB + '/attendance/' + todayKey() + '.json');
    const data = (await res.json()) || {};
    const rows = Object.keys(data).map(k=>data[k]).filter(Boolean);
    rows.sort((a,b)=>((b.ts||0)-(a.ts||0)) || (timeToMin(b.time)-timeToMin(a.time)));

    if(!rows.length){
      box.innerHTML = '<div class="record-empty">오늘 기록이 아직 없습니다</div>';
      return;
    }
    box.innerHTML = rows.map(r=>{
      const isIn = r.type === 'checkin';
      return '<div class="record-row">'
        + '<span class="record-tag ' + (isIn?'tag-in':'tag-out') + '">' + (isIn?'등원':'하원') + '</span>'
        + '<span class="record-name">' + (r.name||'') + '</span>'
        + '<span class="record-time">' + (r.time||'') + '</span>'
        + '</div>';
    }).join('');
  }catch(e){
    box.innerHTML = '<div class="record-empty">기록을 불러오지 못했습니다</div>';
  }
}

/* ---------- 관리자 ---------- */
function goAdmin(){
  const p = prompt('관리자 비밀번호를 입력하세요');
  if(p === null) return;
  if(p === '1234') location.href = '/admin/';
  else showModal('❌ 비밀번호가 올바르지 않습니다', 900);
}

/* ---------- 키보드 입력 ---------- */
document.addEventListener('keydown', e=>{
  if(e.key >= '0' && e.key <= '9') press(e.key);
  else if(e.key === 'Backspace') del();
  else if(e.key === 'Enter') submit('checkin');
});

/* ---------- 초기화 ---------- */
document.getElementById('recordDate').textContent =
  new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
render();
loadStudents();
loadRecords();
setInterval(loadRecords, 15000);
</script>
</body>
</html>
