<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학원 출석</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Noto Sans KR', 'Comic Sans MS', sans-serif;
            background: linear-gradient(135deg, #fff5fb 0%, #f0e6ff 100%);
            padding: 2vh 2vw; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .page-wrap {
            display: flex; gap: 2.5vw; width: 100%; max-width: 1400px; height: 94vh;
            align-items: stretch; flex-wrap: wrap; justify-content: center;
        }

        .container {
            background: linear-gradient(135deg, #fff9fc 0%, #ffe6f0 100%);
            padding: 3vh 3vw; border-radius: 28px; flex: 1 1 560px; max-width: 680px;
            text-align: center; height: 100%; display: flex; flex-direction: column;
            box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
        }
        h1 { color: #ff6b9d; font-size: clamp(32px, 4vw, 52px); margin-bottom: 1.5vh; font-weight: 900; letter-spacing: 1px; }
        
        .guide-box { background: linear-gradient(135deg, #fff0fa 0%, #ffe6f0 100%); border: 3px dashed #ffb8cf; border-radius: 20px; padding: 1.8vh 1.6vw; margin-bottom: 1.5vh; text-align: left; box-shadow: 0 4px 16px rgba(255, 107, 157, 0.1); }
        .guide-title { color: #ff6b9d; font-weight: 900; font-size: clamp(15px, 1.6vw, 19px); margin-bottom: 1vh; text-align: center; }
        .guide-row { display: flex; align-items: center; gap: 10px; padding: 0.7vh 0; font-size: clamp(14px, 1.4vw, 18px); color: #555; font-weight: 600; }
        .guide-order { flex-shrink: 0; width: 2.2em; height: 2.2em; border-radius: 50%; background: linear-gradient(135deg, #ff6b9d, #ff8fab); color: white; font-weight: 900; display: flex; align-items: center; justify-content: center; font-size: clamp(13px, 1.3vw, 16px); box-shadow: 0 4px 12px rgba(255, 107, 157, 0.3); }
        .guide-text { flex: 1; }
        .guide-example { color: #ff6b9d; font-weight: 900; }

        .display { background: linear-gradient(135deg, #fff5f8 0%, #ffe6f0 100%); padding: 3vh 2vw; font-size: clamp(40px, 5vw, 64px); margin: 2.5vh 0; border-radius: 20px; letter-spacing: 4px; border: 3px solid #ffb8cf; box-shadow: 0 6px 20px rgba(255, 107, 157, 0.2); }
        .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.4vh 1.2vw; margin: 2.5vh 0; }
        button {
            padding: 2.6vh 0; font-size: clamp(20px, 2.4vw, 30px); border: none; background: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%);
            border-radius: 16px; cursor: pointer; font-weight: 700; transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(255, 107, 157, 0.15);
        }
        button:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(255, 107, 157, 0.25); }
        button:active { transform: scale(0.95); }
        .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2vw; margin: 2.5vh 0; }
        .btn-submit {
            padding: 2.8vh 0; background: linear-gradient(135deg, #ff6b9d, #ff8fab); color: white; border: none;
            font-size: clamp(20px, 2.4vw, 28px); font-weight: 900; cursor: pointer; border-radius: 16px;
            transition: all 0.2s; box-shadow: 0 6px 20px rgba(255, 107, 157, 0.3);
        }
        .btn-submit:hover { transform: translateY(-4px); box-shadow: 0 8px 28px rgba(255, 107, 157, 0.4); }
        .admin { margin-top: 2.5vh; }
        .admin button { width: 100%; padding: 1.8vh 0; background: linear-gradient(135deg, #9b8dbe, #b5a5d0); color: white; font-weight: 900; font-size: clamp(16px, 1.6vw, 20px); border-radius: 16px; box-shadow: 0 4px 12px rgba(155, 141, 190, 0.2); }
        .admin button:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(155, 141, 190, 0.3); }

        .modal { display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-box { background: linear-gradient(135deg, #fff9fc 0%, #ffe6f0 100%); padding: 5vh 5vw; border-radius: 28px; text-align: center; min-width: 400px; box-shadow: 0 12px 40px rgba(255, 107, 157, 0.2); }
        .modal-icon { font-size: clamp(60px, 8vw, 100px); margin-bottom: 2vh; }
        .modal-name { font-size: clamp(36px, 5vw, 60px); font-weight: 900; color: #ff6b9d; margin-bottom: 2vh; }
        .modal-text { font-size: clamp(26px, 3.6vw, 44px); color: #555; margin-bottom: 2vh; line-height: 1.4; font-weight: 700; }
        .modal-time { font-size: clamp(18px, 2vw, 28px); color: #999; }

        .record-panel {
            background: linear-gradient(135deg, #fff0f8 0%, #ffe6f0 100%);
            padding: 3vh 2.2vw; border-radius: 28px; flex: 1 1 380px; max-width: 460px; text-align: left; height: 100%;
            display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(255, 107, 157, 0.15);
        }
        .record-panel h2 { color: #ff6b9d; font-size: clamp(22px, 2.4vw, 30px); margin-bottom: 0.6vh; font-weight: 900; }
        .record-sub { color: #999; font-size: clamp(13px, 1.3vw, 16px); margin-bottom: 2vh; font-weight: 600; }
        .record-list { overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 1.2vh; }
        .record-row {
            display: flex; align-items: center; justify-content: space-between; padding: 1.8vh 1.2vw; border-radius: 16px;
            background: linear-gradient(135deg, #ffffff 0%, #fff5f8 100%); font-size: clamp(16px, 1.7vw, 20px); font-weight: 700;
            box-shadow: 0 3px 12px rgba(255, 107, 157, 0.1);
        }
        .record-row .rname { font-weight: 900; color: #ff6b9d; }
        .record-row .rtime { color: #999; font-size: clamp(13px, 1.3vw, 16px); font-weight: 600; }
        .record-tag { display: inline-block; padding: 0.5vh 1.2vw; border-radius: 20px; font-size: clamp(12px, 1.2vw, 15px); font-weight: 900; margin-right: 10px; white-space: nowrap; }
        .record-tag.checkin { background: linear-gradient(135deg, #d4f5e8, #a8e6d5); color: #1b7a5a; }
        .record-tag.checkout { background: linear-gradient(135deg, #f5d4d4, #f0a8a8); color: #7a2020; }
        .record-empty { text-align: center; color: #999; padding: 5vh 10px; font-size: clamp(14px, 1.5vw, 18px); font-weight: 600; }

        @media (max-width: 850px) {
            body { align-items: flex-start; }
            .page-wrap { flex-direction: column; align-items: center; height: auto; }
            .container, .record-panel { flex: 1 1 auto; max-width: 600px; width: 100%; height: auto; }
            .record-panel { max-height: 50vh; }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="container">
            <h1>🎨 레이첼영어학원</h1>

            <div class="guide-box">
                <div class="guide-title">🔑 출결코드는 이렇게 확인해요</div>
                <div class="guide-row">
                    <span class="guide-order">첫째</span>
                    <span class="guide-text">부모님 휴대폰 뒷 4자리 + <strong>1</strong> &nbsp;
                        <span class="guide-example">예) 2339 → 23391</span>
                    </span>
                </div>
                <div class="guide-row">
                    <span class="guide-order">둘째</span>
                    <span class="guide-text">부모님 휴대폰 뒷 4자리 + <strong>2</strong> &nbsp;
                        <span class="guide-example">예) 2339 → 23392</span>
                    </span>
                </div>
                <div class="guide-row">
                    <span class="guide-order">셋째</span>
                    <span class="guide-text">부모님 휴대폰 뒷 4자리 + <strong>3</strong> &nbsp;
                        <span class="guide-example">예) 2339 → 23393</span>
                    </span>
                </div>
            </div>

            <div class="display" id="display">•••••</div>

            <div class="keypad">
                <button onclick="addNum('1')">1</button>
                <button onclick="addNum('2')">2</button>
                <button onclick="addNum('3')">3</button>
                <button onclick="addNum('4')">4</button>
                <button onclick="addNum('5')">5</button>
                <button onclick="addNum('6')">6</button>
                <button onclick="addNum('7')">7</button>
                <button onclick="addNum('8')">8</button>
                <button onclick="addNum('9')">9</button>
                <button onclick="addNum('0')">0</button>
                <button onclick="clearNum()">지우기</button>
            </div>

            <div class="actions">
                <button class="btn-submit" onclick="checkIn()">등원</button>
                <button class="btn-submit" onclick="checkOut()" style="background: linear-gradient(135deg, #9b8dbe, #b5a5d0);">하원</button>
            </div>

            <div class="admin">
                <button onclick="goAdmin()">🔐 관리자</button>
            </div>
        </div>

        <div class="record-panel">
            <h2>📋 오늘의 출결 기록</h2>
            <div class="record-sub" id="recordDate"></div>
            <div class="record-list" id="recordList">
                <div class="record-empty">불러오는 중...</div>
            </div>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-box">
            <div class="modal-icon">✅</div>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-time" id="modalTime"></div>
        </div>
    </div>

    <script>
        const DB_URL = 'https://academy-8829d-default-rtdb.asia-southeast1.firebasedatabase.app';
        let num = '';
        let students = [];

        function goAdmin() {
            const pass = prompt('관리자 비번을 입력하세요:');
            if (pass === '1234') {
                window.location.href = '/admin/';
            } else if (pass !== null) {
                alert('비번이 틀렸습니다');
            }
        }

        function loadStudents() {
            fetch(DB_URL + '/students.json')
                .then(res => res.json())
                .then(data => {
                    if (data) {
                        students = Object.entries(data).map(([key, val]) => ({id: key, ...val}));
                    }
                })
                .catch(err => console.log('로드 실패:', err));
        }

        function addNum(n) {
            if (num.length < 5) {
                num += n;
                updateDisplay();
            }
        }

        function clearNum() {
            num = num.slice(0, -1);
            updateDisplay();
        }

        function updateDisplay() {
            const masked = num.padEnd(5, '•');
            document.getElementById('display').textContent = masked.split('').join(' ');
        }

        function showModal(name, text, time) {
            document.getElementById('modalName').textContent = name;
            document.getElementById('modalText').textContent = text;
            document.getElementById('modalTime').textContent = time;
            document.getElementById('modal').classList.add('show');

            setTimeout(() => {
                document.getElementById('modal').classList.remove('show');
                num = '';
                updateDisplay();
            }, 3000);
        }

        function checkIn() {
            if (num.length !== 5) {
                alert('5자리 번호를 입력하세요');
                return;
            }

            loadStudents();
            setTimeout(() => {
                const student = students.find(s => s.pin === num);

                if (!student) {
                    alert('등록되지 않은 번호입니다');
                    num = '';
                    updateDisplay();
                    return;
                }

                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});

                fetch(DB_URL + '/attendance/' + today + '.json', {
                    method: 'POST',
                    body: JSON.stringify({name: student.name, type: 'checkin', time})
                })
                .then(() => {
                    showModal(student.name, '님이 등원하였습니다', time);
                    loadRecords();
                })
                .catch(err => {
                    alert('저장 실패: ' + err);
                    num = '';
                    updateDisplay();
                });
            }, 300);
        }

        function checkOut() {
            if (num.length !== 5) {
                alert('5자리 번호를 입력하세요');
                return;
            }

            loadStudents();
            setTimeout(() => {
                const student = students.find(s => s.pin === num);

                if (!student) {
                    alert('등록되지 않은 번호입니다');
                    num = '';
                    updateDisplay();
                    return;
                }

                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('ko-KR', {hour: '2-digit', minute: '2-digit'});

                fetch(DB_URL + '/attendance/' + today + '.json', {
                    method: 'POST',
                    body: JSON.stringify({name: student.name, type: 'checkout', time})
                })
                .then(() => {
                    showModal(student.name, '님이 하원하였습니다', time);
                    loadRecords();
                })
                .catch(err => {
                    alert('저장 실패: ' + err);
                    num = '';
                    updateDisplay();
                });
            }, 300);
        }

        function loadRecords() {
            const today = new Date().toISOString().split('T')[0];

            fetch(DB_URL + '/attendance/' + today + '.json')
                .then(res => res.json())
                .then(data => {
                    const records = data || {};
                    const keys = Object.keys(records);
                    const sorted = keys.map(k => records[k]).reverse();

                    if (sorted.length === 0) {
                        document.getElementById('recordList').innerHTML = '<div class="record-empty">오늘 기록이 아직 없습니다</div>';
                        return;
                    }

                    let html = '';
                    sorted.forEach(r => {
                        html += `<div class="record-row">
                            <div>
                                <span class="record-tag ${r.type}">${r.type === 'checkin' ? '등원' : '하원'}</span>
                                <span class="rname">${r.name}</span>
                            </div>
                            <span class="rtime">${r.time}</span>
                        </div>`;
                    });
                    document.getElementById('recordList').innerHTML = html;
                })
                .catch(() => {
                    document.getElementById('recordList').innerHTML = '<div class="record-empty">불러오기 실패</div>';
                });
        }

        window.addEventListener('load', () => {
            loadStudents();
            updateDisplay();
            document.getElementById('recordDate').textContent = new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
            loadRecords();
            setInterval(loadRecords, 15000);
        });
    </script>
</body>
</html>
